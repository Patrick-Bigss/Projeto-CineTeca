<!DOCTYPE html>
<html lang="pt-BR>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscando Filmes- CineTeca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="../style.css">
</head>

<body>
    
    <header class="text-center py-4">

        <h1 class="display-4">CineTeca</h1>

        <p>Pesquise seus filmes favoritos</p>

    </header>

    <main class="container">

        <nav class="mb-4">

            <a href="homepage.html" class="btn btn-outline-primary">Início</a>

            <!-- <a href="Cadastro.html" class="btn btn-outline-primary">Cadastro</a> -->

            <a href="Avaliacoes.html" class="btn btn-outline-primary">Avaliações</a>

        </nav>

        <section>

            <h2>Buscar Filme</h2>

            <div class="mb-3">

                <label class="form-label" for="filme">Digite o nome do filme: </label>

                <input type="text" class="form-control" id="filme" placeholder="Ex.: Titanic">

            </div>

            <button type="button" class="btn btn-primary" onclick="buscarFilme()">Buscar </button>

        </section>

        <hr>

        <section>

            <h2>Resultado</h2>

            <div class="card">

                <div class="card-body">

                    <h4 id="tituloFilme">Nome do Filme</h4>

                    <p id="ano">Ano: </p>

                    <p id="diretor">Diretor: </p>

                    <p id="sinopse">Sinopse: </p>

                    <button class="btn btn-success" onclick="adicionarFavorito()"> Adicionar aos Favoritos </button>

                </div>

            </div>

        </section>

    </main>

    
    <script src="../JS/Avaliacoes.js"> </script>
    
    <script src="../JS/BuscarFilme.js"> </script>

    <script src="../JS/resultado.js"> </script>

</body>

</html>
</body>
</html>
